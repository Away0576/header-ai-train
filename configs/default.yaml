version: "0.10.0"

paths:
  data_dir: data
  artifacts_dir: artifacts

data:
  input_format: txt
  input_path: data/train.txt
  value_column: value
  window_size: 60
  stride: 1
  feature_dim: 1
  flatten_order: time_major

model:
  type: autoencoder
  hidden_dim: 128
  latent_dim: 32

training:
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  validation_split: 0.2
  random_seed: 42

threshold:
  percentile: 99.0

onnx:
  opset: 17
  input_name: input
  output_name: reconstruction

alarm:
  consecutive_count: 3
  clear_count: 5
